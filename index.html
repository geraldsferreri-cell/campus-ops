<style>
:root {
  --primary: #ff2442; --primary-light: #fff0f2; --secondary: #fe7e8f;

  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background: #f0f2f5; color: #111827; }

/* 登录页 */
#login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg,#ff2442 0%,#ff6b6b 50%,#ffa8a8 100%); }
.login-card { background:#fff; border-radius:20px; padding:40px 48px; width:440px; box-shadow:0 20px 60px rgba(255,36,66,.25); }
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .icon { font-size:52px; }
.login-logo h1 { font-size:22px; font-weight:700; color:var(--dark); margin-top:8px; }
.login-logo p { color:var(--gray); font-size:13px; margin-top:4px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:500; color:#374151; margin-bottom:6px; }
.form-group input, .form-group select { width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; outline:none; transition:border-color .2s; font-family:inherit; }
.form-group input:focus, .form-group select:focus { border-color:var(--primary); }
.btn-login { width:100%; padding:14px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px; transition:opacity .2s; }
.btn-login:hover { opacity:.88; }
.btn-login:disabled { background:#ccc; cursor:not-allowed; }
.login-error { color:var(--primary); font-size:13px; text-align:center; margin-top:8px; min-height:20px; }

/* 主布局 */
#app { display:none; min-height:100vh; }
.sidebar { position:fixed; left:0; top:0; bottom:0; width:230px; background:var(--dark); color:#fff; display:flex; flex-direction:column; z-index:100; overflow-y:auto; }
.sidebar-header { padding:24px 20px 16px; border-bottom:1px solid rgba(255,255,255,.08); }
.sidebar-header .brand { font-size:16px; font-weight:700; }
.sidebar-header .brand span { color:var(--primary); }
.sidebar-user { padding:16px 20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(255,255,255,.06); font-size:13px; }
.sidebar-user .role-badge { background:rgba(255,36,66,.2); color:#ff6b6b; padding:2px 8px; border-radius:20px; font-size:11px; }
.nav-section { padding:16px 20px 6px; font-size:11px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.05em; }
.nav-item { padding:10px 20px; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:10px; border-radius:0; transition:background .15s; }
.nav-item:hover { background:rgba(255,255,255,.08); }
.nav-item.active { background:rgba(255,36,66,.18); color:#ff6b6b; border-right:3px solid var(--primary); }
.nav-item .icon { font-size:16px; }
.main-wrap { margin-left:230px; min-height:100vh; display:flex; flex-direction:column; width:calc(100% - 230px); box-sizing:border-box; }
.topbar { background:#fff; padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; flex-shrink:0; }
.topbar-title { font-size:18px; font-weight:600; }
.topbar-actions { display:flex; gap:10px; align-items:center; }
.content { padding:28px; flex:1; width:100%; box-sizing:border-box; overflow-x:auto; }
.card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; margin-bottom:20px; }
.card-title { font-size:15px; font-weight:600; margin-bottom:16px; color:var(--dark); }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:20px; }
.stat-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; }
.stat-card .label { font-size:13px; color:var(--gray); margin-bottom:8px; }
.stat-card .value { font-size:28px; font-weight:700; color:var(--dark); }
.stat-card.blue .value { color:var(--info); }
.stat-card.green .value { color:var(--success); }
.stat-card.red .value { color:var(--primary); }
.stat-card.orange .value { color:var(--warning); }
.stat-card.purple .value { color:var(--purple); }
.stat-card .sub { font-size:12px; color:var(--gray); margin-top:4px; }
.chart-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:20px; }
.chart-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; }
.chart-card h4 { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--dark); }
.chart-full { height:260px; }
.chart-half { height:240px; }

/* 表格 */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
thead th { padding:12px 16px; text-align:left; font-size:12px; color:var(--gray); font-weight:600; border-bottom:2px solid var(--border); white-space:nowrap; }
tbody td { padding:12px 16px; font-size:14px; border-bottom:1px solid var(--light); vertical-align:middle; }
tbody tr:hover { background:#fafafa; }
tbody tr:last-child td { border-bottom:none; }

/* 标签 */
.tag { display:inline-block; padding:2px 8px; border-radius:20px; font-size:12px; font-weight:500; }
.tag-active { background:#d1fae5; color:#065f46; }
.tag-inactive { background:#fee2e2; color:#991b1b; }
.tag-pending { background:#fef3c7; color:#92400e; }
.tag-fashion { background:#fce7f3; color:#9d174d; }
.tag-marketing { background:#dbeafe; color:#1e40af; }
.tag-ad { background:#ede9fe; color:#5b21b6; }
.tag-tech { background:#d1fae5; color:#065f46; }

/* 按钮 */
.btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; transition:all .2s; font-family:inherit; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { opacity:.88; }
.btn-secondary { background:#f3f4f6; color:#374151; }
.btn-secondary:hover { background:#e5e7eb; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-warning:hover { opacity:.88; }
.btn-success { background:var(--success); color:#fff; }
.btn-link { background:none; color:var(--primary); padding:4px 8px; }
.btn-link:hover { background:var(--primary-light); border-radius:4px; }
.btn-sm { padding:5px 10px; font-size:12px; }

/* 筛选栏 */
.filter-bar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.filter-bar select, .filter-bar input { padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; outline:none; font-family:inherit; }
.filter-bar select:focus, .filter-bar input:focus { border-color:var(--primary); }

/* 模态框 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-overlay.show { animation:fadeIn .2s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal { background:#fff; border-radius:16px; padding:32px; width:100%; max-width:520px; max-height:85vh; overflow-y:auto; animation:slideUp .2s; }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal h3 { font-size:18px; font-weight:700; margin-bottom:20px; color:var(--dark); }
.modal-form .form-group { margin-bottom:14px; }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }

/* 空状态 */
.empty-state { text-align:center; padding:48px 0; color:var(--gray); }
.empty-state .icon { font-size:40px; opacity:.4; }
.empty-state p { margin-top:12px; font-size:14px; }

/* Toast */
#toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--dark); color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; z-index:9999; display:none; box-shadow:0 4px 20px rgba(0,0,0,.2); }

/* 响应式 */
@media(max-width:768px) {
  .sidebar { width:60px; }
  .sidebar-header .brand,.sidebar-user span,.nav-item span:not(.icon),.nav-section { display:none; }
  .main-wrap { margin-left:60px; }
  .chart-grid { grid-template-columns:1fr; }
  .login-card { padding:32px 24px; width:100%; }
}

/* 薪资配置 */
.salary-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.salary-item { display:flex; align-items:center; gap:12px; padding:14px; background:#f9fafb; border-radius:10px; }
.salary-item label { font-size:14px; color:var(--gray); min-width:100px; }
.salary-item input { flex:1; padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; outline:none; font-family:inherit; }
.salary-item input:focus { border-color:var(--primary); }

/* 薪资结算卡片 */
.salary-group { margin-bottom:24px; }
.salary-group-title { font-size:15px; font-weight:600; color:var(--dark); margin-bottom:12px; padding-left:4px; }
.salary-cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
.salary-card { background:#fff; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; transition:box-shadow .2s; }
.salary-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.12); }
.salary-card-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; background:linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border-bottom:1px solid var(--light); }
.salary-card-name { font-size:15px; font-weight:600; color:var(--dark); }
.salary-card-status { font-size:12px; padding:4px 10px; border-radius:20px; font-weight:500; }
.salary-card-status.settled { background:#dcfce7; color:#16a34a; }
.salary-card-status.pending { background:#fef3c7; color:#d97706; }
.salary-card-body { padding:12px 16px; }
.salary-detail-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:13px; }
.salary-detail-row.highlight { background:#fef3c7; margin:4px -8px; padding:6px 8px; border-radius:6px; }
.salary-label { color:var(--gray); }
.salary-value { font-weight:500; color:var(--dark); }
.salary-divider { height:1px; background:var(--border); margin:8px 0; }
.salary-formula { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:12px; }
.formula-text { color:var(--gray); font-family:monospace; }
.formula-result { font-weight:600; color:var(--primary); }
.salary-card-footer { padding:12px 16px; background:#f8fafc; border-top:1px solid var(--light); }
.salary-total { display:flex; justify-content:space-between; align-items:center; font-size:14px; }
.salary-total b { font-size:18px; color:var(--primary); }
.filter-summary { font-size:14px; color:var(--gray); margin-left:auto; }
.filter-summary b { font-size:16px; }

/* 学生上传 */
.post-card { display:flex; gap:16px; padding:16px 0; border-bottom:1px solid var(--light); }
.post-card:last-child { border-bottom:none; }
.post-card .platform-tag { width:6px; border-radius:3px; flex-shrink:0; }
.post-card .info { flex:1; }
.post-card .title { font-size:14px; font-weight:500; margin-bottom:6px; }
.post-card .meta { font-size:12px; color:var(--gray); display:flex; gap:12px; flex-wrap:wrap; }
</style>
</head>

  },
  async select(table, query='') {

];

// 根据日期获取方片月信息
function getFangpianMonth(dateStr) {
  if (!dateStr) return null;
  const date = dateStr.slice(0, 10); // 提取 YYYY-MM-DD
  return FANGPIAN_MONTHS.find(m => date >= m.start && date <= m.end) || null;
}

// 获取可选的方片月列表（用于下拉选择）
function getFangpianMonthOptions() {
  return FANGPIAN_MONTHS.map(m => ({
    value: m.month,
    label: m.label,
    start: m.start,
    end: m.end
  }));
}

// 根据日期范围获取对应的方片月列表
function getFangpianMonthsInRange(startDate, endDate) {
  return FANGPIAN_MONTHS.filter(m => {
    // 方片月开始/结束日期在选择范围内，或者方片月完全在范围内
    return (m.start <= endDate && m.end >= startDate);
  });
}

// 过滤posts数据，仅保留在指定日期范围内的
function filterPostsByDateRange(posts, startDate, endDate) {
  if (!startDate || !endDate) return posts;
  return posts.filter(p => {
    const date = (p.createdAt || '').slice(0, 10);
    return date >= startDate && date <= endDate;
  });
}

// 获取当前选中的日期范围（默认当前方片月）
function getCurrentDateRange() {
  const fpMonths = getFangpianMonthOptions();
  const today = new Date().toISOString().slice(0, 10);
  // 默认选中包含今天的方片月
  const currentFP = fpMonths.find(m => today >= m.start && today <= m.end);
  return {
    startDate: currentFP ? currentFP.start : (fpMonths[0]?.start || '2026-01-01'),
    endDate: currentFP ? currentFP.end : (fpMonths[fpMonths.length - 1]?.end || '2026-12-31'),
    currentMonth: currentFP?.value || fpMonths[0]?.value
  };
}

async function doLogin() {
  console.log('>>> doLogin 开始执行, Supabase URL:', SUPA_URL, 'Key:', SUPA_KEY.slice(0,20)+'...');
  const btn = $('login-btn');
  const errEl = $('login-error');
  const u = $('login-username').value.trim();

  console.log('输入用户名:', u);
  if (!u || !p) { errEl.textContent = '请填写用户名和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中…'; errEl.textContent = '';
  try {
    console.log('正在查询 co_users...');
    // 1. 先用 username 查询
    let users = await SB.select('co_users', `?username=eq.${encodeURIComponent(u)}&active=eq.true`);
    let found = users && users.find(x => checkPass(p, x.password));
    
    // 2. 如果没找到，尝试用 real_name 查询（学生可用姓名登录）
    if (!found) {
      console.log('用户名未命中，尝试姓名查询...');
      users = await SB.select('co_users', `?real_name=eq.${encodeURIComponent(u)}&active=eq.true&role=eq.student`);
      if (users && users.length > 0) {
        // 学生可以用统一密码 123456 登录
        found = users.find(x => p === '123456' || checkPass(p, x.password));
      }
    }
    
    console.log('查询结果:', found);
    if (!found) { btn.disabled=false; btn.textContent='登 录'; errEl.textContent='用户名或密码错误'; return; }
    console.log('登录成功，准备加载数据...');
    currentUser = { id:found.id, username:found.username, realName:found.real_name||found.realName, role:found.role, groupId:found.group_id||found.groupId };
    localStorage.setItem('cu', JSON.stringify(currentUser));
    // 加载全量数据
    console.log('正在 DS.load()...');
    const ok = await DS.load();
    console.log('DS.load 结果:', ok);
    if (ok) { console.log('调用 initApp()...'); initApp(); }
  } catch(e) {
    btn.disabled=false; btn.textContent='登 录';
    errEl.textContent = '网络错误，请检查连接';
    console.error(e);
  }
}

function renderDataExport() {

  if (!exportDateRange.startDate || !exportDateRange.endDate) {
    const allPosts = DB.posts.filter(p => {

      const dates = allPosts.map(p => p.postDate || p.createdAt?.slice(0, 10)).filter(d => d);
      if (dates.length > 0) {
        exportDateRange.startDate = dates.sort()[0];
        exportDateRange.endDate = dates.sort()[dates.length - 1];
      }
    }
    if (!exportDateRange.startDate) {
      exportDateRange.startDate = new Date().toISOString().slice(0, 10);
      exportDateRange.endDate = new Date().toISOString().slice(0, 10);
    }

    const accountPosts = DB.posts.filter(p => {
      if (p.accountId !== account.id) return false;
      const postDate = p.postDate || p.createdAt?.slice(0, 10) || '';
      if (!postDate) return false;
      return postDate >= exportDateRange.startDate && postDate <= exportDateRange.endDate;
    });

      postCount: accountPosts.length,

function downloadExportData() {
  const accounts = currentUser.role === 'admin' 
    ? DB.accounts 
    : DB.accounts.filter(a => !a.groupId || Number(a.groupId) === Number(currentUser.groupId));

  const exportData = [];
  accounts.forEach(account => {
    const accountPosts = DB.posts.filter(p => {
      if (p.accountId !== account.id) return false;
      const postDate = p.postDate || p.createdAt?.slice(0, 10) || '';
      if (!postDate) return false;
      return postDate >= exportDateRange.startDate && postDate <= exportDateRange.endDate;
    });
    const thousandLikeCount = accountPosts.filter(p => (p.likes || 0) >= 1000 && (p.likes || 0) < 10000).length;
    const tenThousandLikeCount = accountPosts.filter(p => (p.likes || 0) >= 10000).length;
    const totalViews = accountPosts.reduce((sum, p) => sum + (p.views || 0), 0);
    const totalLikes = accountPosts.reduce((sum, p) => sum + (p.likes || 0), 0);
    const publishers = [...new Set(accountPosts.map(p => {
      const u = DB.users.find(u => u.id === p.userId);
      return u?.realName || '未知';
    }))].join('、');
    const postDates = [...new Set(accountPosts.map(p => p.postDate || p.createdAt?.slice(0, 10) || '').filter(d => d))];
    const postUrls = accountPosts.map(p => p.url || '').filter(url => url);
    
    exportData.push({
      accountName: account.name || '',
      platform: account.platform || '',
      publishers,
      postDates: postDates.join('、'),
      postUrls: postUrls.join('、'),
      postCount: accountPosts.length,
      totalViews,
      totalLikes,
      thousandLikeCount,
      tenThousandLikeCount
    });
  });

  // 生成 xlsx - 使用 localStorage 传递数据给 Python
  const headers = ['账号名称', '平台', '发布者', '发布日期', '视频链接', '发片数', '第7天播放量', '第7天点赞数'];
  const rows = exportData.map(d => [d.accountName, d.platform, d.publishers, d.postDates, d.postUrls, d.postCount, d.totalViews, d.totalLikes]);
  
  const tempData = JSON.stringify({ headers, rows });
  const jsonPath = 'C:/Users/Windows/WorkBuddy/20260429104300/campus-ops/export_temp.json';
  const xlsxPath = 'C:/Users/Windows/WorkBuddy/20260429104300/campus-ops/export_temp.xlsx';
  
  // 保存 JSON 数据
  const blob = new Blob([tempData], { type: 'application/json' });
  const reader = new FileReader();
  reader.onload = function() {
    // 使用 fetch API 保存 JSON 文件
    fetch('data:application/json;base64,' + btoa(tempData)).then(res => res.blob()).then(blob => {
      // 由于浏览器限制，我们改用 Python 直接创建
      // 通过 execute_command 调用
      window._exportDataJson = tempData;
      window._exportXlsxPath = xlsxPath;
      toast('正在生成文件...');
    });
  };
  
  // 直接通过命令行调用 Python
  const pythonScript = `
import json
import openpyxl
from openpyxl.styles import Font, PatternFill, Alignment, Border, Side
import sys

data = json.loads(sys.argv[1])
wb = openpyxl.Workbook()
ws = wb.active
ws.title = "账号数据导出"

header_font = Font(name='Arial', bold=True, size=11, color='FFFFFF')
header_fill = PatternFill(start_color='4A90D9', end_color='4A90D9', fill_type='solid')
header_align = Alignment(horizontal='center', vertical='center')
thin_border = Border(left=Side(style='thin'), right=Side(style='thin'), top=Side(style='thin'), bottom=Side(style='thin'))

for col, header in enumerate(data['headers'], 1):
    cell = ws.cell(row=1, column=col, value=header)
    cell.font = header_font
    cell.fill = header_fill
    cell.alignment = header_align
    cell.border = thin_border

for row_idx, row_data in enumerate(data['rows'], 2):
    for col_idx, value in enumerate(row_data, 1):
        cell = ws.cell(row=row_idx, column=col_idx, value=value)
        cell.border = thin_border
        cell.alignment = Alignment(horizontal='center', vertical='center')

col_widths = [15, 10, 15, 20, 40, 8, 12, 12, 10, 10]
for i, width in enumerate(col_widths, 1):
    ws.column_dimensions[openpyxl.utils.get_column_letter(i)].width = width

wb.save(sys.argv[2])
`.trim();

  // 创建 Python 脚本
  const scriptBlob = new Blob([pythonScript], { type: 'text/plain' });
  
  // 使用 XMLHttpRequest 同步调用 (通过动态脚本加载)
  // 由于无法直接执行 Python，我们改用生成 CSV 然后前端转换为 xlsx 的方式
  // 或者使用 SheetJS 库
  
  // 改用 SheetJS (xlsx) 库直接在浏览器生成
  // 引入 xlsx 库
  if (typeof XLSX === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
    script.onload = generateXlsx;
    document.head.appendChild(script);
  } else {
    generateXlsx();
  }
  
  function generateXlsx() {
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '账号数据导出');
    
    // 设置列宽
    ws['!cols'] = [
      { wch: 15 }, { wch: 10 }, { wch: 15 }, { wch: 20 }, { wch: 40 },
      { wch: 8 }, { wch: 15 }, { wch: 15 }
    ];
    
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `账号数据导出_${exportDateRange.startDate}_${exportDateRange.endDate}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
    toast('导出成功');
  }
}

// 方片月选择变化
function onFangpianMonthChange() {
  const sel = $('fp-month-select');
  if (!sel) {
    console.log('fp-month-select not found');
    return;
  }
  const month = sel.value;
  console.log('Selected month:', month);
  let newStartDate = '';
  let newEndDate = '';
  
  if (!month) {
    // 全部方片月 - 使用整个数据范围
    const earliest = FANGPIAN_MONTHS[0]?.start || '2026-01-01';
    const latest = FANGPIAN_MONTHS[FANGPIAN_MONTHS.length - 1]?.end || '2026-12-31';
    newStartDate = earliest;
    newEndDate = latest;
    dashboardDateRange = { startDate: newStartDate, endDate: newEndDate, currentMonth: '' };
  } else {
    const fp = FANGPIAN_MONTHS.find(m => m.month === month);
    console.log('Found fp:', fp);
    if (fp) {
      newStartDate = fp.start;
      newEndDate = fp.end;
      dashboardDateRange = { 
        startDate: newStartDate, 
        endDate: newEndDate, 
        currentMonth: fp.month 
      };
    }
  }
  
  console.log('Updating dates:', newStartDate, newEndDate);
  
  // 更新所有日期输入框（可能存在于多个页面）
  const startEls = document.querySelectorAll('#dash-start-date, #export-start-date');
  const endEls = document.querySelectorAll('#dash-end-date, #export-end-date');
  console.log('Found start date inputs:', startEls.length);
  console.log('Found end date inputs:', endEls.length);
  
  startEls.forEach(el => {
    if (el) {
      el.value = newStartDate;
      console.log('Updated start date input to:', newStartDate);
    }
  });
  endEls.forEach(el => {
    if (el) {
      el.value = newEndDate;
      console.log('Updated end date input to:', newEndDate);
    }
  });
  
  refreshDashboard();
}

// 自定义日期范围变化
function onCustomDateChange() {
  const startDate = $('dash-start-date')?.value || '';
  const endDate = $('dash-end-date')?.value || '';
  
  if (startDate && endDate && startDate <= endDate) {
    dashboardDateRange = { 
      startDate, 
      endDate, 
      currentMonth: '' 
    };
    // 清除方片月选择
    if ($('fp-month-select')) $('fp-month-select').value = '';
    refreshDashboard();
  }
}

function renderCharts(allPosts, gMap, gPosts) {
  const c1 = `
    <div class="chart-card"><h4>📈 发片趋势（按组别）</h4><div id="c-trend" class="chart-half"></div></div>
    <div class="chart-card"><h4>🏅 千赞 TOP5</h4><div id="c-rank" class="chart-half"></div></div>
    <div class="chart-card"><h4>🏆 万赞 TOP5</h4><div id="c-rank-10k" class="chart-half"></div></div>
  `;
  const c2 = `
    <div class="chart-card"><h4>👨‍🎓 同学发片数排名</h4><div id="c-stu-posts" class="chart-half"></div></div>
    <div class="chart-card"><h4>📱 账号发片数排名</h4><div id="c-tea-posts" class="chart-half"></div></div>

}

function drawCharts(allPosts, gMap, gPosts) {
  // 发片趋势 - 横轴为组别，纵轴为条数
  const tEl = $('c-trend');
  if (tEl && typeof echarts !== 'undefined') {
    if (chartInst.trend) chartInst.trend.dispose();
    chartInst.trend = echarts.init(tEl);

    // 按组别统计发片数
    const groupNames = DB.groups.map(g => g.name);
    const groupPostCounts = DB.groups.map(g => {
      const groupStudents = DB.users.filter(u => u.role === 'student' && Number(u.groupId) === g.id);
      return allPosts.filter(p => groupStudents.some(s => s.id === p.userId)).length;
    });

    chartInst.trend.setOption({
      tooltip:{trigger:'axis'},
      grid:{left:12,right:12,top:12,bottom:36,containLabel:true},
      xAxis:{type:'category',data:groupNames,axisLabel:{fontSize:11}},
      yAxis:{type:'value',name:'发片数',splitLine:{lineStyle:{type:'dashed',color:'#eee'}}},
      series:[{type:'bar',data:groupPostCounts,itemStyle:{color:'#ff2442'},barRadius:[4,4,0,0]}]
    });
  }

  // 千赞排名 - 横轴为同学姓名，纵轴为点赞数
  const rEl = $('c-rank');
  if (rEl && typeof echarts !== 'undefined') {
    if (chartInst.rank) chartInst.rank.dispose();
    chartInst.rank = echarts.init(rEl);
    const topPosts = [...allPosts].filter(p=>(p.likes||0)>=1000).sort((a,b)=>(b.likes||0)-(a.likes||0)).slice(0,5);
    const names = topPosts.map(p=>DB.users.find(u=>u.id===p.userId)?.realName||'未知');
    chartInst.rank.setOption({
      tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:par=>`${par[0].name}<br>点赞: ${fmt(par[0].value)}`},
      grid:{left:12,right:12,top:12,bottom:36,containLabel:true},
      xAxis:{type:'category',data:names,axisLabel:{fontSize:11,rotate:0}},
      yAxis:{type:'value',splitLine:{lineStyle:{type:'dashed',color:'#eee'}}},
      series:[{type:'bar',data:topPosts.map(p=>p.likes||0),itemStyle:{color:'#ff2442'},barRadius:[4,4,0,0]}]
    });
  }

  // 万赞排名 - 横轴为同学姓名，纵轴为点赞数
  const r10kEl = $('c-rank-10k');
  if (r10kEl && typeof echarts !== 'undefined') {
    if (chartInst.rank10k) chartInst.rank10k.dispose();
    chartInst.rank10k = echarts.init(r10kEl);
    const top10kPosts = [...allPosts].filter(p=>(p.likes||0)>=10000).sort((a,b)=>(b.likes||0)-(a.likes||0)).slice(0,5);
    const names10k = top10kPosts.map(p=>DB.users.find(u=>u.id===p.userId)?.realName||'未知');
    chartInst.rank10k.setOption({
      tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:par=>`${par[0].name}<br>点赞: ${fmt(par[0].value)}`},
      grid:{left:12,right:12,top:12,bottom:36,containLabel:true},
      xAxis:{type:'category',data:names10k,axisLabel:{fontSize:11,rotate:0}},
      yAxis:{type:'value',splitLine:{lineStyle:{type:'dashed',color:'#eee'}}},
      series:[{type:'bar',data:top10kPosts.map(p=>p.likes||0),itemStyle:{color:'#f59e0b'},barRadius:[4,4,0,0]}]
    });
  }

  // 同学发片数排名 - 横轴为同学姓名，纵轴为发片数
  const stuPostsEl = $('c-stu-posts');
  if (stuPostsEl && typeof echarts !== 'undefined') {
    if (chartInst.stuPosts) chartInst.stuPosts.dispose();
    chartInst.stuPosts = echarts.init(stuPostsEl);
    // 按同学统计发片数
    const students = DB.users.filter(u => u.role === 'student');
    const stuPostData = students.map(s => ({
      name: s.realName,
      count: allPosts.filter(p => p.userId === s.id).length
    })).filter(s => s.count > 0).sort((a, b) => b.count - a.count);
    const stuNames = stuPostData.map(s => s.name);
    const stuCounts = stuPostData.map(s => s.count);
    chartInst.stuPosts.setOption({
      tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:par=>`${par[0].name}<br>发片: ${par[0].value} 条`},
      grid:{left:12,right:12,top:12,bottom:36,containLabel:true},
      xAxis:{type:'category',data:stuNames,axisLabel:{fontSize:11,rotate:0}},
      yAxis:{type:'value',name:'发片数',splitLine:{lineStyle:{type:'dashed',color:'#eee'}}},
      series:[{type:'bar',data:stuCounts,itemStyle:{color:'#3b82f6'},barRadius:[4,4,0,0]}]
    });
  }

  // 账号发片数排名 - 横轴为账号名称，纵轴为发片数
  const teaPostsEl = $('c-tea-posts');
  if (teaPostsEl && typeof echarts !== 'undefined') {
    if (chartInst.teaPosts) chartInst.teaPosts.dispose();
    chartInst.teaPosts = echarts.init(teaPostsEl);
    // 按账号统计发片数
    const accountPostData = DB.accounts.map(a => {
      const count = allPosts.filter(p => p.accountId === a.id).length;
      return { name: a.name, count };
    }).filter(t => t.count > 0).sort((a, b) => b.count - a.count);
    const teaNames = accountPostData.map(t => t.name);
    const teaCounts = accountPostData.map(t => t.count);
    chartInst.teaPosts.setOption({
      tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:par=>`${par[0].name}<br>发片: ${par[0].value} 条`},
      grid:{left:12,right:12,top:12,bottom:36,containLabel:true},
      xAxis:{type:'category',data:teaNames,axisLabel:{fontSize:11,rotate:0}},
      yAxis:{type:'value',name:'发片数',splitLine:{lineStyle:{type:'dashed',color:'#eee'}}},
      series:[{type:'bar',data:teaCounts,itemStyle:{color:'#10b981'},barRadius:[4,4,0,0]}]
    });
  }

  window._rCharts = () => {
    Object.values(chartInst).forEach(c=>{try{c&&c.resize()}catch(e){}});
  };
}

function exportCSV() {
  const rows = [['平台','账号','姓名','播放量','点赞','评论','发片时间']];
  DB.posts.forEach(p => {
    const u = DB.users.find(x=>x.id===p.userId);
    const a = DB.accounts.find(x=>x.id===p.accountId);
    rows.push([p.platform||'', a?.name||'', u?.realName||'', p.views||0, p.likes||0, p.comments||0, p.createdAt||'']);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`视频数据_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); toast('导出成功');
}

      <div class="form-group"><label>角色名称</label><input id="r-name" value="${r.name}"></div>

      </div>
    </div>`);

async function saveRole(editId) {
  const name = $('r-name').value.trim();
  const description = $('r-desc').value.trim();
  if (!name) return toast('请填写角色名称');
  try {
    if (editId) {
      await SB.update('co_roles', { name, description }, `?id=eq.${editId}`);
      const r = DB.roles.find(x=>x.id===editId);
      if(r) { r.name=name; r.description=description; }
    } else {
      const id = $('r-id').value.trim().toLowerCase().replace(/\s+/g,'_');
      if (!id||DB.roles.find(x=>x.id===id)) return toast('角色ID不能为空或重复');
      await SB.insert('co_roles', {id, name, description, perms:[]});
      DB.roles.push({id, name, description, perms:[]});
    }
    document.querySelector('.modal-overlay').remove();
    toast('保存成功'); renderRoles();
  } catch(e) { toast('保存失败：' + e.message); }
}

async function delRole(id) {
  if (!confirm('确认删除该角色？')) return;
  try {
    await SB.delete('co_roles', `?id=eq.${id}`);
    DB.roles = DB.roles.filter(x=>x.id!==id);
    toast('删除成功'); renderRoles();
  } catch(e) { toast('删除失败：' + e.message); }
}

async function saveUser(editId) {
  const name = ($('au-name')||$('eu-name')).value.trim();
  const user = ($('au-user')||$('eu-user'));
  const pass = ($('au-pass')||$('eu-pass'));
  const role = $('au-role') || $('eu-name'); // hack: use eu-name as placeholder after edit
  const groupEl = $('au-group') || $('eu-group');
  const phoneEl = $('au-phone') || $('eu-phone');
  const schoolEl = $('au-school') || $('eu-school');
  const activeEl = $('eu-active');

  if (!name) return toast('请填写姓名');

  try {
    if (editId) {
      const payload = {
        real_name: name,
        phone: phoneEl?.value.trim()||'',
        school: schoolEl?.value.trim()||'',
        group_id: groupEl?.value ? parseInt(groupEl.value) : null
      };
      if (activeEl) payload.active = activeEl.value==='true';
      if (pass?.value.trim()) payload.password = pass.value.trim();
      await SB.update('co_users', payload, `?id=eq.${editId}`);
      const u = DB.users.find(x=>x.id===editId);
      if(u) {
        u.realName = u.real_name = name;
        u.phone = payload.phone;
        u.school = payload.school;
        u.groupId = u.group_id = payload.group_id;
        if (activeEl) u.active = payload.active;
        if (pass?.value.trim()) u.password = pass.value.trim();
      }
    } else {
      if (!user?.value.trim()) return toast('请填写用户名');
      if (!pass?.value.trim()) return toast('请填写密码');
      const uid = $('au-user').value.trim();
      if (DB.users.find(x=>x.username===uid)) return toast('用户名已存在');
      const r = $('au-role').value;
      const gId = $('au-group').value ? parseInt($('au-group').value) : null;
      const newUser = {
        username: uid,
        password: hashPass($('au-pass').value.trim()),
        real_name: name,
        role: r,
        phone: $('au-phone').value.trim(),
        school: $('au-school').value.trim(),
        group_id: gId,
        active: true
      };
      const inserted = await SB.insert('co_users', newUser);
      const row = Array.isArray(inserted) ? inserted[0] : inserted;
      DB.users.push({ ...row, realName: row.real_name, groupId: row.group_id });
    }
    document.querySelector('.modal-overlay').remove();
    toast('保存成功'); renderUsers();
  } catch(e) { toast('保存失败：' + e.message); }
}

async function delUser(id, name) {
  if (!confirm(`确认删除成员「${name}」？\n删除后其视频记录和分配的账号将一并移除。`)) return;
  try {
    await SB.delete('co_users', `?id=eq.${id}`);
    await SB.delete('co_posts', `?user_id=eq.${id}`);
    // 解除账号分配
    await SB.update('co_accounts', { assigned_to: null, status: '未分配' }, `?assigned_to=eq.${id}`);
    DB.users = DB.users.filter(x=>x.id!==id);
    DB.posts = DB.posts.filter(p=>p.userId!==id && p.user_id!==id);
    DB.accounts.forEach(a=>{ if(a.assignedTo==id||a.assigned_to==id) { a.assignedTo=null; a.assigned_to=null; a.status='未分配'; } });
    toast('删除成功'); renderUsers();
  } catch(e) { toast('删除失败：' + e.message); }
}

  try {
    if (editId) {
      await SB.update('co_groups', { name, teacher_id: teacherId, teacher_name: teacherName }, `?id=eq.${editId}`);

      DB.groups.push({ ...row, teacherId: row.teacher_id, teacherName: row.teacher_name });

function onPlatformSelectChange() {
  const sel = $('platform-select');
  const platId = sel.value;
  const plat = DB.platforms.find(p=>p.id===platId);
  const allAccts = currentUser.role==='admin' ? DB.accounts : DB.accounts.filter(a=>a.groupId===currentUser.groupId||!a.groupId);
  const platAccts = allAccts.filter(a=>a.platform===platId);
  const using = platAccts.filter(a=>a.status==='使用中').length;
  const total = platAccts.length;
  const unassigned = platAccts.filter(a=>!a.assignedTo).length;
  $('platform-stats').innerHTML = `${plat?.name || ''}：使用中 <b style="color:var(--success)">${using}</b> 个，待分配 <b style="color:var(--warning)">${unassigned}</b> 个，共 <b>${total}</b> 个账号`;
  $('af-plat').value = platId;
  filterAccts();
}

function onTypeSelectChange() {
  const sel = $('type-select');
  const typeVal = sel.value;
  const allAccts = currentUser.role==='admin' ? DB.accounts : DB.accounts.filter(a=>a.groupId===currentUser.groupId||!a.groupId);
  const typeAccts = typeVal ? allAccts.filter(a=>a.type===typeVal) : allAccts;
  const using = typeAccts.filter(a=>a.status==='使用中').length;
  const total = typeAccts.length;
  $('type-stats').innerHTML = `${typeVal||'全部'}：使用中 <b style="color:var(--success)">${using}</b> 个，共 <b>${total}</b> 个账号`;
  $('af-type').value = typeVal;
  filterAccts();
}

function filterAccts() {
  const pl = $('af-plat').value;
  const tp = $('af-type').value;
  const st = $('af-status').value;
  let shown = 0;
  document.querySelectorAll('#acct-table tbody tr').forEach(r=>{
    const ok = (!pl||r.dataset.plat===pl) && (!tp||r.dataset.type===tp) && (!st||r.dataset.status===st);
    r.style.display = ok?'':'none';
    if(ok) shown++;
  });
  if($('filter-stats')) $('filter-stats').innerHTML = `当前显示 <b>${shown}</b> 条`;
}

  if(!a) return;

  const gName = gId ? (DB.groups.find(g=>g.id==gId)?.name||'') : '';

async function delAccount(id) {

    await SB.delete('co_accounts', `?id=eq.${id}`);
    DB.accounts = DB.accounts.filter(x=>x.id!==id);

  } catch(e) { toast('删除失败：' + e.message); }
}

async function fixAccountGroups() {
  let fixed = 0;
  const updates = [];
  DB.accounts.forEach(a => {
    const uid = a.assignedTo || a.assigned_to;
    if (uid) {
      const user = DB.users.find(u=>u.id==uid);
      const gid = user?.groupId || user?.group_id;
      if (user && gid) {
        const gidStr = String(gid);
        if (String(a.groupId||a.group_id) !== gidStr) {
          const grpName = DB.groups.find(g=>g.id==gid)?.name||'';
          a.groupId = a.group_id = gid;
          a.groupName = a.group_name = grpName;
          updates.push(SB.update('co_accounts', { group_id: parseInt(gid), group_name: grpName }, `?id=eq.${a.id}`));
          fixed++;
        }
      }
    }
  });
  if (fixed > 0) {
    try {
      await Promise.all(updates);
      toast(`已修复 ${fixed} 个账号的分组信息`);
      renderAccounts();
    } catch(e) { toast('修复失败：' + e.message); }
  } else {
    toast('所有账号分组信息已同步，无需修复');
  }
}

async function doAssign(id) {
  const a = DB.accounts.find(x=>x.id===id);
  if(!a) return;
  const stuId = $('assign-stu').value ? parseInt($('assign-stu').value) : null;
  const status = stuId ? '使用中' : '未分配';
  let gId = a.group_id || a.groupId;
  let gName = a.group_name || a.groupName || '';

// 文件选择处理
function onFileSelect() {
  const fileInput = $('import-file');
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let data;
      if (file.name.endsWith('.json')) {
        data = JSON.parse(e.target.result);
        // 支持多种 JSON 格式
        if (data.videos) data = data.videos;
        if (!Array.isArray(data)) data = [data];
      } else if (file.name.endsWith('.csv')) {
        data = parseCSV(e.target.result);
      }

      if (data && data.length > 0) {
        // 显示预览
        const preview = $('import-preview');
        const previewContent = $('import-preview-content');
        preview.style.display = 'block';

        let html = `<table style="width:100%;border-collapse:collapse">
          <tr style="background:#e5e7eb">
            <th style="padding:6px 8px;text-align:left">标题</th>
            <th style="padding:6px 8px;text-align:right">播放</th>
            <th style="padding:6px 8px;text-align:right">点赞</th>
            <th style="padding:6px 8px;text-align:right">评论</th>
            <th style="padding:6px 8px;text-align:left">时间</th>
          </tr>`;

        data.slice(0, 5).forEach(item => {
          const title = (item.title || item.desc || item.note_title || '未知').substring(0, 20);
          const views = item.views || item.play_count || item.playCount || 0;
          const likes = item.likes || item.liked_count || item.likedCount || 0;
          const comments = item.comments || item.comment_count || item.commentCount || 0;
          const time = item.publish_time || item.time || item.create_time || '';
          html += `<tr style="border-bottom:1px solid #eee">
            <td style="padding:6px 8px">${title}...</td>
            <td style="padding:6px 8px;text-align:right">${views}</td>
            <td style="padding:6px 8px;text-align:right">${likes}</td>
            <td style="padding:6px 8px;text-align:right">${comments}</td>
            <td style="padding:6px 8px">${time}</td>
          </tr>`;
        });

        if (data.length > 5) {
          html += `<tr><td colspan="5" style="padding:8px;color:var(--gray)">...还有 ${data.length - 5} 条数据</td></tr>`;
        }
        html += '</table>';
        previewContent.innerHTML = html;

        // 启用导入按钮
        $('import-btn').disabled = false;
        window._importData = data;
      } else {
        toast('文件内容为空或格式不正确');
      }
    } catch (err) {
      toast('文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
}

// 解析 CSV
function parseCSV(text) {
  const lines = text.split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];

  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
  const data = [];

  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',');
    const item = {};
    headers.forEach((h, idx) => {
      item[h] = values[idx]?.trim() || '';
    });
    data.push(item);
  }
  return data;
}

// 执行导入
async function doImportData() {
  const fileInput = $('import-file');
  const file = fileInput.files[0];
  if (!file) return toast('请先选择文件');

  const accountId = parseInt($('import-account').value);
  const studentId = parseInt($('import-student').value);
  const mode = $('import-mode').value;
  let importData = window._importData || [];

  if (!accountId) return toast('请选择匹配的账号');
  if (!studentId) return toast('请选择发布学生');

  const account = DB.accounts.find(a=>a.id===accountId);
  if (!account) return toast('选择的账号不存在');

  let added = 0, updated = 0, skipped = 0;

  try {
    // 根据模式处理现有数据
    if (mode === 'replace') {
      await SB.delete('co_posts', `?account_id=eq.${accountId}&user_id=eq.${studentId}`);
      DB.posts = DB.posts.filter(p=>!(p.accountId===accountId && p.userId===studentId));
    } else if (mode === 'skip') {
      const existingIds = new Set(DB.posts.filter(p=>(p.accountId===accountId||p.account_id===accountId) && (p.userId===studentId||p.user_id===studentId)).map(p=>p.noteId||p.note_id||p.id));
      importData = importData.filter(d=>!existingIds.has(d.id||d.note_id));
    }

    // 批量插入/更新
    const toInsert = [];
    for (const item of importData) {
      const noteId = item.id || item.note_id || item.noteId;
      const title = item.title || item.desc || item.note_title || '';
      const views = parseInt(item.views || item.play_count || item.playCount || 0);
      const likes = parseInt(item.likes || item.liked_count || item.likedCount || 0);
      const comments = parseInt(item.comments || item.comment_count || item.commentCount || 0);
      const collect = parseInt(item.collect || item.collect_count || item.collectCount || 0);
      const publishTime = item.publish_time || item.time || item.create_time || new Date().toISOString();

      const existing = DB.posts.find(p=>(p.noteId||p.note_id)===noteId || ((p.accountId===accountId||p.account_id===accountId) && p.title===title));
      if (existing) {
        await SB.update('co_posts', { views, likes, comments, collect, fetch_status: '已抓取' }, `?id=eq.${existing.id}`);
        Object.assign(existing, { views, likes, comments, collect, fetchStatus: '已抓取', fetch_status: '已抓取' });
        updated++;
      } else {
        toInsert.push({
          note_id: noteId, platform: account.platform,
          account_id: accountId, user_id: studentId,
          title, views, likes, comments, collect,
          fetch_status: '已抓取',
          created_at: publishTime.length > 10 ? publishTime : new Date().toISOString()
        });
        added++;
      }
    }
    if (toInsert.length > 0) {
      const rows = await SB.insert('co_posts', toInsert);
      (Array.isArray(rows) ? rows : [rows]).forEach(row => {
        DB.posts.unshift({ ...row, accountId: row.account_id, userId: row.user_id, fetchStatus: row.fetch_status });
      });
    }

    const resultDiv = $('import-result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `<div style="padding:12px;background:#d1fae5;border-radius:8px;color:#065f46;font-size:13px">
      <b>导入完成！</b><br>✅ 新增：${added} 条<br>🔄 更新：${updated} 条<br>⏭️ 跳过：${skipped} 条
    </div>`;
    $('import-btn').disabled = true;
    setTimeout(() => { document.querySelector('.modal-overlay').remove(); toast(`导入完成：新增${added}条，更新${updated}条`); renderPosts(); }, 1500);
  } catch(e) { toast('导入失败：' + e.message); }
}

async function savePost(editId) {
  try {
    if (editId) {
      const p = DB.posts.find(x=>x.id===editId);
      if(p) {
        const payload = {
          url: $('ep-url').value||'',
          views: parseInt($('ep-views').value)||0,
          likes: parseInt($('ep-likes').value)||0,
          comments: parseInt($('ep-comments').value)||0,
          fetch_status: $('ep-status').value
        };
        await SB.update('co_posts', payload, `?id=eq.${editId}`);
        Object.assign(p, { ...payload, fetchStatus: payload.fetch_status });
      }
    } else {
      const stuId = parseInt($('np-stu').value);
      const acctId = parseInt($('np-acct').value);
      if (!stuId||!acctId) return toast('请选择账号和学生');
      const payload = {
        platform: $('np-plat').value,
        account_id: acctId,
        user_id: stuId,
        url: $('np-url').value||'',
        views: parseInt($('np-views').value)||0,
        likes: parseInt($('np-likes').value)||0,
        comments: parseInt($('np-comments').value)||0,
        fetch_status: '已抓取'
      };
      const inserted = await SB.insert('co_posts', payload);
      const row = Array.isArray(inserted) ? inserted[0] : inserted;
      DB.posts.unshift({ ...row, accountId: row.account_id, userId: row.user_id, fetchStatus: row.fetch_status });
    }
    document.querySelector('.modal-overlay').remove();
    toast('保存成功'); renderPosts();
  } catch(e) { toast('保存失败：' + e.message); }
}

async function delPost(id) {
  if (!confirm('确认删除该视频记录？')) return;
  try {
    await SB.delete('co_posts', `?id=eq.${id}`);
    DB.posts = DB.posts.filter(x=>x.id!==id);
    toast('删除成功'); renderPosts();
  } catch(e) { toast('删除失败：' + e.message); }
}

async function submitPost() {
  const acctId = parseInt($('sp-acct').value);
  const title = $('sp-title').value.trim();
  const url = $('sp-url').value.trim();
  if (!acctId) return toast('请先分配运营账号');
  if (!title) return toast('请输入视频标题');
  if (!url) return toast('请输入视频链接');
  try {
    const payload = {
      platform: $('sp-plat').value,
      account_id: acctId,
      user_id: currentUser.id,
      url,
      title,
      note: $('sp-note').value.trim(),
      views: parseInt($('sp-views').value)||0,
      likes: parseInt($('sp-likes').value)||0,
      comments: 0,
      fetch_status: '已抓取'
    };
    const inserted = await SB.insert('co_posts', payload);
    const row = Array.isArray(inserted) ? inserted[0] : inserted;
    DB.posts.unshift({ ...row, accountId: row.account_id, userId: row.user_id, fetchStatus: row.fetch_status });
    toast('提交成功');
    $('sp-title').value = '';
    $('sp-url').value = '';
    $('sp-views').value = '0';
    $('sp-likes').value = '0';
    $('sp-note').value = '';
    navigate('my-posts');
  } catch(e) { toast('提交失败：' + e.message); }
}

// ═══════════════════════════════════════════════════════════════
// 薪资结算
// ═══════════════════════════════════════════════════════════════
function calcSalary(user, yearMonth) {
  const cfg = DB.salaryConfigs[user.role] || {};
  if (user.role==='student') {
    const posts = DB.posts.filter(p=>p.studentId===user.id&&(p.postDate||'').startsWith(yearMonth));
    const thousandLikeCount = posts.filter(p=>(p.likes||0)>=1000&&(p.likes||0)<10000).length;
    const tenThousandLikeCount = posts.filter(p=>(p.likes||0)>=10000).length;
    const milestoneCount = thousandLikeCount + tenThousandLikeCount;
    const rules = cfg.baseRules || [{min:0,max:2,amount:20},{min:3,max:5,amount:25},{min:6,max:Infinity,amount:30}];
    const baseRule = rules.find(r=>milestoneCount>=r.min&&milestoneCount<=r.max)||rules[rules.length-1];
    const bonus = (thousandLikeCount*(cfg.thousandLikeBonus||80)) + (tenThousandLikeCount*(cfg.tenThousandLikeBonus||120));
    const base = milestoneCount * baseRule.amount;
    const total = base + bonus;
    return { base, bonus:bonus.toFixed(2), total:total.toFixed(2), postCount:posts.length, thousandLikeCount, tenThousandLikeCount, milestoneCount, baseRule:baseRule.amount, totalViews:posts.reduce((s,p)=>s+(p.views||0),0), totalLikes:posts.reduce((s,p)=>s+(p.likes||0),0) };
  } else if (['teacher_director','teacher_editor','team_leader'].includes(user.role)) {
    const stuCount = DB.users.filter(u=>u.groupId===user.groupId&&u.role==='student').length;
    // 计算小组内所有学生的千/万赞奖金总和
    const stuBonus = DB.users.filter(u=>u.groupId===user.groupId&&u.role==='student').reduce((sum, stu) => {
      const stuPosts = DB.posts.filter(p=>p.studentId===stu.id&&(p.postDate||'').startsWith(yearMonth));
      const thousandLikeCount = stuPosts.filter(p=>(p.likes||0)>=1000&&(p.likes||0)<10000).length;
      const tenThousandLikeCount = stuPosts.filter(p=>(p.likes||0)>=10000).length;
      const stuThousandBonus = thousandLikeCount*(cfg.thousandLikeBonus||80);
      const stuTenThousandBonus = tenThousandLikeCount*(cfg.tenThousandLikeBonus||120);
      return sum + stuThousandBonus + stuTenThousandBonus;
    }, 0);
    const perf = stuBonus * 0.5; // 带教奖金 = 学生千/万赞奖金总和的50%
    return { base: 0, performance: perf.toFixed(2), total: perf.toFixed(2), studentCount: stuCount, stuBonus: stuBonus.toFixed(2) };
  }
  return { base:0, performance:'0.00', total:'0.00' };
}

  const months = Array.from({length:6},(_,i)=>{ const d=new Date(ym.getFullYear(),ym.getMonth()-i,1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; });

  const directors = defaultRole==='all'||defaultRole==='teacher_director'?users.filter(u=>u.role==='teacher_director'):[];
  const editors = defaultRole==='all'||defaultRole==='teacher_editor'?users.filter(u=>u.role==='teacher_editor'):[];
  const leaders = defaultRole==='all'||defaultRole==='team_leader'?users.filter(u=>u.role==='team_leader'):[];

    if (u.role==='student') {
      // 从配置或记录中获取手动填写的达标视频数
      const milestone = rec?rec.milestoneCount:(DB.salaryInputs?.[u.id]?.[ym]?.milestoneCount||0);
      const cfg = DB.salaryConfigs.student || {};
      const rules = cfg.baseRules || [{min:0,max:2,amount:20},{min:3,max:5,amount:25},{min:6,max:Infinity,amount:30}];
      const baseRule = rules.find(r=>milestone>=r.min&&milestone<=r.max)||rules[rules.length-1];
      const base = milestone * baseRule.amount;
      const bonus = milestone * baseRule.amount; // 奖金也按达标视频数算

      else totalSalary += parseFloat(rec.total);

      return `
        <div class="salary-card">
          <div class="salary-card-header">
            <div class="salary-card-name">👨‍🎓 ${u.realName}</div>
            <div class="salary-card-status ${isSettled?'settled':'pending'}">${isSettled?'已结算':'待结算'}</div>
          </div>
          <div class="salary-card-body">
            <div class="salary-detail-row">
              <span class="salary-label">发片数</span>
              <span class="salary-value">${live.postCount||0} 条</span>
            </div>
            ${!isSettled?`
            <div class="salary-detail-row highlight">
              <span class="salary-label">达标视频数</span>
              <input type="number" id="sc-mc-${u.id}" value="${milestone}" min="0" style="width:60px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:center" onchange="updateSalaryCard(${u.id},'${ym}')">
              <span class="salary-value">条</span>
            </div>
            `:`<div class="salary-detail-row highlight">
              <span class="salary-label">达标视频数</span>
              <span class="salary-value">${milestone} 条</span>
            </div>`}
            <div class="salary-divider"></div>
            <div class="salary-detail-row">
              <span class="salary-label">底薪单价</span>
              <span class="salary-value">${baseRule.amount} 元/条</span>
            </div>
            <div class="salary-formula">
              <span class="formula-text">底薪 = ${milestone} × ${baseRule.amount}</span>
              <span class="formula-result">= ¥${base}</span>
            </div>
            <div class="salary-formula">
              <span class="formula-text">奖金</span>
              <span class="formula-result">= ¥${bonus}</span>

          </div>
          <div class="salary-card-footer">
            <div class="salary-total">

              <b>¥${isSettled?rec.total:total.toFixed(2)}</b>

    } else {
      // 老师/组长

      const stuBonus = rec?(rec.stuBonus||0):(live.stuBonus||0);

async function doSalaryCalc() {
  if (!confirm('确认将当前薪资计算结果保存为正式记录？')) return;
  const ym = new Date(); ym.setMonth(ym.getMonth()-1);
  const yearMonth = `${ym.getFullYear()}-${String(ym.getMonth()+1).padStart(2,'0')}`;
  const cfg = DB.salaryConfigs.student || {};
  const rules = cfg.baseRules || [{min:0,max:2,amount:20},{min:3,max:5,amount:25},{min:6,max:Infinity,amount:30}];
  const inserts = [], updates = [];

  DB.users.filter(u=>u.active).forEach(u => {
    const existing = DB.salaryRecords.findIndex(r=>(r.userId||r.user_id)===u.id&&(r.yearMonth||r.year_month)===yearMonth);
    let live = calcSalary(u, yearMonth);

    // 学生使用手动填写的达标视频数
    if (u.role === 'student') {
      const inputData = DB.salaryInputs?.[u.id]?.[yearMonth];
      const milestoneCount = inputData?.milestoneCount || live.milestoneCount || 0;
      const baseRule = rules.find(r=>milestoneCount>=r.min&&milestoneCount<=r.max)||rules[rules.length-1];
      const base = milestoneCount * baseRule.amount;
      const bonus = milestoneCount * baseRule.amount;
      const total = base + bonus;
      live = { ...live, milestoneCount, base, bonus, total };
    }

    const realName = u.realName || u.real_name;
    const rec = { year_month: yearMonth, user_id:u.id, user_name:realName, role:u.role, post_count:live.postCount||0, milestone_count:live.milestoneCount||0, base:live.base||0, bonus:live.bonus||0, total:live.total||0, status:'已结算' };
    if (existing>=0) {
      DB.salaryRecords[existing] = { ...DB.salaryRecords[existing], ...rec, yearMonth, userId:u.id, userName:realName };
      updates.push(SB.update('co_salary_records', rec, `?user_id=eq.${u.id}&year_month=eq.${yearMonth}`));
    } else {
      DB.salaryRecords.push({ ...rec, yearMonth, userId:u.id, userName:realName });
      inserts.push(rec);
    }
  });
  try {
    await Promise.all(updates);
    if (inserts.length > 0) await SB.insert('co_salary_records', inserts);
    toast('薪资结算完成'); renderSalary();
  } catch(e) { toast('结算失败：' + e.message); }
}

function exportSalary() {
  const rows = [['姓名','角色','月份','发片数','达标视频数','底薪单价','底薪','奖金','合计','状态']];
  DB.salaryRecords.forEach(r=>{
    rows.push([
      r.userName, roleName(r.role), r.yearMonth,
      r.postCount||0, r.milestoneCount||0, r.baseRule||0,
      r.base||0, r.bonus||0, r.total||0, r.status||''
    ]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`薪资记录_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); toast('导出成功');
}

function updateSalaryCard(userId, yearMonth) {
  const milestone = parseInt($('sc-mc-'+userId).value) || 0;
  const cfg = DB.salaryConfigs.student || {};
  const rules = cfg.baseRules || [{min:0,max:2,amount:20},{min:3,max:5,amount:25},{min:6,max:Infinity,amount:30}];
  const baseRule = rules.find(r=>milestone>=r.min&&milestone<=r.max)||rules[rules.length-1];
  const base = milestone * baseRule.amount;
  const bonus = milestone * baseRule.amount;
  const total = base + bonus;

  // 保存到临时输入（仅本地session，提交时一起写入）
  DB.salaryInputs = DB.salaryInputs || {};
  DB.salaryInputs[userId] = DB.salaryInputs[userId] || {};
  DB.salaryInputs[userId][yearMonth] = { milestoneCount: milestone, base, bonus, total };
  // 不需要写库，仅临时保留直至点击结算

  // 重新渲染卡片
  const card = $('sc-card-'+userId);
  if (card) {
    card.querySelector('.salary-formula').nextSibling.textContent = '= ¥'+bonus;
    card.querySelector('.salary-total b').textContent = '¥'+total.toFixed(2);
  }

  // 更新总计
  recalcTotal();
}

function recalcTotal() {
  const selMonth = $('sal-month')?.value;
  if (!selMonth) return;
  let total = 0;
  DB.users.filter(u=>u.role==='student'&&u.active).forEach(u => {
    const rec = DB.salaryRecords.find(r=>r.userId===u.id&&r.yearMonth===selMonth);
    if (rec) total += parseFloat(rec.total);
    else if (DB.salaryInputs?.[u.id]?.[selMonth]?.total) total += DB.salaryInputs[u.id][selMonth].total;
  });
  const summary = document.querySelector('.filter-summary b');
  if (summary) summary.textContent = '¥'+total.toFixed(2);
}

        `:`<div class="stat-card"><div class="label">基本工资</div><div class="value">¥${cfg.base||0}/月</div></div>
        <div class="stat-card"><div class="label">带队学生</div><div class="value">${DB.users.filter(u=>u.groupId===currentUser.groupId&&u.role==='student').length}人</div></div>`}
      </div>
    </div>
    <div class="card" style="max-width:600px">
      <div class="card-title">📋 薪资记录</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>月份</th><th>保底</th><th>绩效</th><th>合计</th><th>状态</th></tr></thead>
          <tbody>
            ${myRecords.length?myRecords.map(r=>`<tr>
              <td>${r.yearMonth}</td><td>¥${r.base||0}</td><td>¥${r.performance||0}</td>
              <td><b style="color:var(--primary)">¥${r.total||0}</b></td>
              <td>${tag(r.status,'tag-active')}</td>
            </tr>`).join(''):`<tr><td colspan="5"><div class="empty-state"><div class="icon">💰</div><p>暂无薪资记录</p></div></td></tr>`}

}

function resetData() {
  if (!confirm('⚠️ 确认重置所有数据？此操作不可恢复！')) return;
  if (!confirm('再次确认：所有数据将被清空，确定继续？')) return;
  DS.reset();
  toast('数据已重置，请重新登录'); doLogout();
}
